<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <!-- Warm saffron-to-maroon gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c86b1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0522d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b1e1e;stop-opacity:1" />
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d060;stop-opacity:1" />
    </linearGradient>

    <!-- Radial glow -->
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>

    <!-- Decorative pattern -->
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="600" fill="url(#bgGrad)"/>
  <rect width="1920" height="600" fill="url(#dots)"/>
  <rect width="1920" height="600" fill="url(#glow)"/>

  <!-- Top decorative border -->
  <line x1="0" y1="0" x2="1920" y2="0" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Bottom decorative border -->
  <line x1="0" y1="598" x2="1920" y2="598" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Decorative left lotus -->
  <g transform="translate(120, 180)" opacity="0.15">
    <ellipse cx="0" cy="-30" rx="25" ry="40" fill="#ffffff"/>
    <ellipse cx="20" cy="-15" rx="25" ry="40" fill="#ffffff" transform="rotate(25)"/>
    <ellipse cx="-20" cy="-15" rx="25" ry="40" fill="#ffffff" transform="rotate(-25)"/>
    <ellipse cx="0" cy="-15" rx="35" ry="50" fill="#ffffff" transform="rotate(12)"/>
    <ellipse cx="0" cy="-15" rx="35" ry="50" fill="#ffffff" transform="rotate(-12)"/>
    <ellipse cx="0" cy="-5" rx="10" ry="15" fill="#d4af37"/>
  </g>

  <!-- Decorative right lotus -->
  <g transform="translate(1800, 200)" opacity="0.12">
    <ellipse cx="0" cy="-30" rx="20" ry="35" fill="#ffffff"/>
    <ellipse cx="15" cy="-15" rx="20" ry="35" fill="#ffffff" transform="rotate(25)"/>
    <ellipse cx="-15" cy="-15" rx="20" ry="35" fill="#ffffff" transform="rotate(-25)"/>
    <ellipse cx="0" cy="-10" rx="8" ry="12" fill="#d4af37"/>
  </g>

  <!-- Mid-left decorative element - conch -->
  <g transform="translate(200, 400)" opacity="0.10">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M30,-5 Q50,-20 40,-40 Q30,-55 20,-45 Q10,-35 25,-25 Q35,-15 30,-5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="300" cy="500" r="80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <circle cx="300" cy="500" r="120" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>

  <circle cx="1620" cy="100" r="60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <circle cx="1620" cy="100" r="100" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>

  <!-- Central Content -->

  <!-- ISKCON Logo / emblem -->
  <g transform="translate(960, 140)">
    <!-- Temple silhouette -->
    <path d="M0,-50 L-25,-20 L-25,50 L25,50 L25,-20 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6"/>
    <path d="M-12,-20 L0,-40 L12,-20" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="10" r="6" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
    <!-- Flag -->
    <path d="M0,-50 L0,-65 L15,-60 L0,-55" fill="url(#goldGrad)" opacity="0.5"/>
  </g>

  <!-- Main heading -->
  <text x="960" y="250" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="4">
    Sudamaseva
  </text>

  <!-- Gold decorative line -->
  <rect x="730" y="270" width="460" height="2" rx="1" fill="url(#goldGrad)"/>

  <!-- Gold star/diamond accent -->
  <polygon points="960,278 965,283 960,288 955,283" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="960" y="320" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="28" fill="#f0d060" letter-spacing="2" font-style="italic">
    Monthly Seva Subscription
  </text>

  <!-- Description line 1 -->
  <text x="960" y="365" text-anchor="middle" font-family="'Poppins', 'Arial', sans-serif" font-size="16" fill="rgba(255,255,255,0.85)" letter-spacing="1">
    Offer Consistent Support to the Temple's Spiritual Mission
  </text>

  <!-- Description line 2 -->
  <text x="960" y="395" text-anchor="middle" font-family="'Poppins', 'Arial', sans-serif" font-size="14" fill="rgba(255,255,255,0.65)" letter-spacing="0.5">
    100% of your donation goes directly to deity worship, prasadam, festivals &amp; outreach
  </text>

  <!-- Bottom decorative line -->
  <rect x="760" y="420" width="400" height="1" rx="0.5" fill="rgba(255,255,255,0.2)"/>

  <!-- End ornament - small lotus -->
  <g transform="translate(960, 480)" opacity="0.08">
    <ellipse cx="0" cy="-10" rx="8" ry="14" fill="#ffffff"/>
    <ellipse cx="7" cy="-5" rx="8" ry="14" fill="#ffffff" transform="rotate(20)"/>
    <ellipse cx="-7" cy="-5" rx="8" ry="14" fill="#ffffff" transform="rotate(-20)"/>
    <ellipse cx="0" cy="-3" rx="3" ry="5" fill="#d4af37"/>
  </g>

  <!-- Sanskrit / Devanagari text -->
  <text x="960" y="540" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="20" fill="rgba(255,255,255,0.2)" font-style="italic">
    ॐ सुदामसेवा
  </text>
</svg>
